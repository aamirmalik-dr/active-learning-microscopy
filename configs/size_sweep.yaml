# Operating-point check for raster-vs-hunt parity: a coarse-to-fine raster at
# 300 points has completed its stride-4 pass, which puts every position within
# 2.83 px of a sample. A hit is only guaranteed for core radius >= 2.83 px
# (defect sigma >= 2.40); at sigma 2.0 (core 2.35 px) the pass covers 94
# percent of possible centres, at sigma 1.5 it covers 61 percent, at sigma 1.0
# just 27 percent (activescan.metrics.lattice_coverage_fraction). Sweep defect
# sigma at fixed count to watch the coverage story play out.
mode: size_sweep
out: results/size_sweep.json
scene:
  grid: 64
  length_scale: 10.0
  field_kind: smooth
  n_defects: 8
  defect_amplitude: 5.0
  noise_sigma: 0.3
budget: 300
defect_sigmas: [1.0, 1.5, 2.0, 3.0]
strategies: [lhs, raster, active_hunt]
seeds: [0, 1, 2]
n_init: 16
refit_every: 25
kernel: rbf
