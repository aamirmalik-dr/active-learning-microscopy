# Fraction of defects found at a fixed 300-measurement budget as defects
# get rarer or more common.
mode: sparsity_sweep
out: results/sparsity_sweep.json
scene:
  grid: 64
  length_scale: 10.0
  field_kind: smooth
  defect_amplitude: 5.0
  defect_sigma: 2.0
  noise_sigma: 0.3
budget: 300
defect_counts: [2, 4, 8, 16]
strategies: [random, lhs, active_hunt]
seeds: [0, 1, 2]
n_init: 16
refit_every: 25
kernel: rbf
